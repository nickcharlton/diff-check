---
name: 'Diff Check'
description: 'An Action which runs a command and fails if it changes anything.'
inputs:
  command:
    description: 'Command to run'
    required: true
runs:
  using: "composite"
  steps:
    - run: ${{ inputs.command }}
      shell: bash
    - run: |
        if [ ! "$(git diff-index --quiet HEAD --)" ]; then
          for n in $(git diff --name-only); do
            # echo "::error file=$n::$n has changed"
            echo "$n has changed" >> $GITHUB_STEP_SUMMARY
          done
          exit 1
        fi
      shell: bash
